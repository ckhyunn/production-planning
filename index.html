<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>총괄생산계획 최적화</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #00ff9d;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-muted: #334155;
    --red: #ff4757;
    --yellow: #ffd32a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .header {
    position: relative;
    z-index: 10;
    padding: 28px 40px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    background: linear-gradient(to right, rgba(0,212,255,0.05), transparent);
  }

  .header-icon {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .header p {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .badge {
    margin-left: auto;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    border: 1px solid var(--accent);
    color: var(--accent);
    letter-spacing: 0.5px;
  }

  .layout {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: calc(100vh - 97px);
  }

  /* ── 좌측 패널 ── */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 24px;
    overflow-y: auto;
    background: var(--surface);
  }

  .section-title {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .section { margin-bottom: 28px; }

  /* 수요 입력 */
  .demand-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 8px;
  }

  .demand-cell { display: flex; flex-direction: column; gap: 4px; }
  .demand-cell label {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
  }

  input[type="number"], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 10px;
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
    width: 100%;
    transition: border-color 0.2s;
    outline: none;
  }

  input[type="number"]:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,212,255,0.1);
  }

  /* 파라미터 그리드 */
  .param-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .param-item { display: flex; flex-direction: column; gap: 4px; }
  .param-item label {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* 모델 선택 */
  .model-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .model-btn {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .model-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.08);
  }

  /* 실행 버튼 */
  .run-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'IBM Plex Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
  }

  .run-btn:hover { background: #33ddff; transform: translateY(-1px); }
  .run-btn:active { transform: translateY(0); }
  .run-btn:disabled {
    background: var(--text-muted);
    color: var(--text-dim);
    cursor: not-allowed;
    transform: none;
  }

  .run-btn .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto;
  }

  .run-btn.loading .btn-text { display: none; }
  .run-btn.loading .spinner { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 우측 메인 ── */
  .main {
    padding: 28px 32px;
    overflow-y: auto;
  }

  /* 빈 상태 */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 16px;
    color: var(--text-dim);
  }

  .empty-icon { font-size: 64px; opacity: 0.3; }
  .empty-state h2 { font-size: 18px; font-weight: 400; }
  .empty-state p { font-size: 13px; opacity: 0.6; }

  /* KPI 카드 */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .kpi-card.blue::before { background: var(--accent); }
  .kpi-card.orange::before { background: var(--accent2); }
  .kpi-card.green::before { background: var(--accent3); }
  .kpi-card.red::before { background: var(--red); }

  .kpi-label {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .kpi-value {
    font-size: 24px;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: -1px;
  }

  .kpi-card.blue .kpi-value { color: var(--accent); }
  .kpi-card.orange .kpi-value { color: var(--accent2); }
  .kpi-card.green .kpi-value { color: var(--accent3); }
  .kpi-card.red .kpi-value { color: var(--red); }

  .kpi-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* 차트 영역 */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    animation: fadeUp 0.5s ease both;
  }

  .chart-card.wide {
    grid-column: span 2;
  }

  .chart-title {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .chart-container { position: relative; }

  /* 테이블 */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
    animation: fadeUp 0.6s ease both;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
  }

  th {
    text-align: right;
    padding: 8px 12px;
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  th:first-child { text-align: left; }

  td {
    padding: 10px 12px;
    text-align: right;
    border-bottom: 1px solid rgba(30,45,69,0.5);
    color: var(--text);
  }

  td:first-child { text-align: left; color: var(--text-dim); }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(0,212,255,0.03); }

  .td-highlight { color: var(--accent) !important; font-weight: 500; }
  .td-warn { color: var(--accent2) !important; }
  .td-danger { color: var(--red) !important; }

  /* 에러 */
  .error-box {
    background: rgba(255,71,87,0.1);
    border: 1px solid rgba(255,71,87,0.3);
    border-radius: 8px;
    padding: 16px 20px;
    color: var(--red);
    font-size: 13px;
    margin-bottom: 16px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 비용 바 */
  .cost-bar-wrap { margin-top: 12px; }
  .cost-bar-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .cost-bar-label { font-size: 11px; color: var(--text-dim); width: 110px; flex-shrink: 0; font-family: 'IBM Plex Mono', monospace; }
  .cost-bar-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .cost-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
  .cost-bar-val { font-size: 11px; color: var(--text); width: 80px; text-align: right; font-family: 'IBM Plex Mono', monospace; }
</style>
</head>
<body>

<header class="header">
  <div class="header-icon">📊</div>
  <div>
    <h1>총괄생산계획 최적화 시스템</h1>
    <p>Aggregate Production Planning · Pyomo + GLPK</p>
  </div>
  <span class="badge">SMART MANUFACTURING</span>
</header>

<div class="layout">

  <!-- ── 좌측 입력 패널 ── -->
  <aside class="sidebar">

    <!-- 모델 선택 -->
    <div class="section">
      <div class="section-title">최적화 모델</div>
      <div class="model-toggle">
        <button class="model-btn" onclick="setModel('LP')" id="btn-LP">LP (연속)</button>
        <button class="model-btn active" onclick="setModel('IP')" id="btn-IP">IP (정수)</button>
      </div>
    </div>

    <!-- 수요 입력 -->
    <div class="section">
      <div class="section-title">월별 수요 예측 (개)</div>
      <div class="demand-grid" id="demand-grid"></div>
      <div style="display:flex; gap:8px; margin-top:8px;">
        <button onclick="addMonth()" style="flex:1; padding:6px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text-dim); font-size:12px; cursor:pointer;">+ 월 추가</button>
        <button onclick="removeMonth()" style="flex:1; padding:6px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text-dim); font-size:12px; cursor:pointer;">− 월 제거</button>
      </div>
    </div>

    <!-- 비용 파라미터 -->
    <div class="section">
      <div class="section-title">비용 파라미터 (천원)</div>
      <div class="param-grid">
        <div class="param-item">
          <label>재료비/개</label>
          <input type="number" id="material_cost" value="10" min="0" step="1"/>
        </div>
        <div class="param-item">
          <label>재고유지비/개/월</label>
          <input type="number" id="holding_cost" value="2" min="0" step="0.5"/>
        </div>
        <div class="param-item">
          <label>부재고비용/개/월</label>
          <input type="number" id="backlog_cost" value="5" min="0" step="1"/>
        </div>
        <div class="param-item">
          <label>고용비용/인</label>
          <input type="number" id="hire_cost" value="300" min="0" step="10"/>
        </div>
        <div class="param-item">
          <label>해고비용/인</label>
          <input type="number" id="fire_cost" value="500" min="0" step="10"/>
        </div>
        <div class="param-item">
          <label>하청비용/개</label>
          <input type="number" id="outsource_cost" value="30" min="0" step="1"/>
        </div>
        <div class="param-item">
          <label>정규임금/시간</label>
          <input type="number" id="regular_wage" value="4" min="0" step="0.5"/>
        </div>
        <div class="param-item">
          <label>초과임금/시간</label>
          <input type="number" id="overtime_wage" value="6" min="0" step="0.5"/>
        </div>
      </div>
    </div>

    <!-- 생산 파라미터 -->
    <div class="section">
      <div class="section-title">생산 파라미터</div>
      <div class="param-grid">
        <div class="param-item">
          <label>초기 재고 (개)</label>
          <input type="number" id="initial_inventory" value="1000" min="0"/>
        </div>
        <div class="param-item">
          <label>최종 재고 (개)</label>
          <input type="number" id="final_inventory" value="500" min="0"/>
        </div>
        <div class="param-item">
          <label>초기 근로자 (명)</label>
          <input type="number" id="initial_workers" value="80" min="1"/>
        </div>
        <div class="param-item">
          <label>표준작업시간 (h/개)</label>
          <input type="number" id="std_time" value="4" min="0.1" step="0.1"/>
        </div>
        <div class="param-item">
          <label>작업일수 (일/월)</label>
          <input type="number" id="work_days" value="20" min="1"/>
        </div>
        <div class="param-item">
          <label>작업시간 (h/일)</label>
          <input type="number" id="work_hours" value="8" min="1"/>
        </div>
        <div class="param-item" style="grid-column:span 2;">
          <label>최대초과시간 (h/인/월)</label>
          <input type="number" id="max_overtime" value="10" min="0"/>
        </div>
      </div>
    </div>

    <button class="run-btn" onclick="runOptimization()" id="run-btn">
      <span class="btn-text">⚡ 최적화 실행</span>
      <div class="spinner"></div>
    </button>

  </aside>

  <!-- ── 우측 결과 ── -->
  <main class="main" id="main-content">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🏭</div>
      <h2>총괄생산계획을 수립해보세요</h2>
      <p>좌측에서 수요와 파라미터를 설정하고 최적화를 실행하세요</p>
    </div>
    <div id="result-area" style="display:none;"></div>
  </main>

</div>

<script>
// ── 상태 ──────────────────────────────────────────────
let modelType = 'IP';
let months = 6;
let defaultDemand = [1600, 3000, 3200, 3800, 2200, 2200];
let charts = {};

// ── 초기화 ────────────────────────────────────────────
function init() {
  renderDemandGrid();
}

function setModel(type) {
  modelType = type;
  document.getElementById('btn-LP').classList.toggle('active', type === 'LP');
  document.getElementById('btn-IP').classList.toggle('active', type === 'IP');
}

function renderDemandGrid() {
  const grid = document.getElementById('demand-grid');
  grid.innerHTML = '';
  for (let i = 0; i < months; i++) {
    grid.innerHTML += `
      <div class="demand-cell">
        <label>${i+1}월</label>
        <input type="number" id="demand-${i}" value="${defaultDemand[i] ?? 2000}" min="0" step="100"/>
      </div>`;
  }
}

function addMonth() {
  if (months >= 12) return;
  const last = parseFloat(document.getElementById(`demand-${months-1}`)?.value || 2000);
  defaultDemand[months] = last;
  months++;
  renderDemandGrid();
}

function removeMonth() {
  if (months <= 1) return;
  months--;
  renderDemandGrid();
}

function getDemand() {
  return Array.from({length: months}, (_, i) =>
    parseFloat(document.getElementById(`demand-${i}`).value) || 0
  );
}

function getParam(id) {
  return parseFloat(document.getElementById(id).value) || 0;
}

// ── 최적화 실행 ───────────────────────────────────────
async function runOptimization() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.classList.add('loading');

  const payload = {
    demand: getDemand(),
    material_cost: getParam('material_cost'),
    holding_cost: getParam('holding_cost'),
    backlog_cost: getParam('backlog_cost'),
    hire_cost: getParam('hire_cost'),
    fire_cost: getParam('fire_cost'),
    outsource_cost: getParam('outsource_cost'),
    regular_wage: getParam('regular_wage'),
    overtime_wage: getParam('overtime_wage'),
    initial_inventory: getParam('initial_inventory'),
    final_inventory: getParam('final_inventory'),
    initial_workers: getParam('initial_workers'),
    std_time: getParam('std_time'),
    work_days: getParam('work_days'),
    work_hours: getParam('work_hours'),
    max_overtime: getParam('max_overtime'),
    model_type: modelType,
  };

  try {
    const res = await fetch('/api/optimize', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!res.ok) {
      showError(data.detail || '최적화 실패');
    } else {
      renderResults(data);
    }
  } catch (e) {
    showError('서버 연결 실패: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

// ── 에러 표시 ─────────────────────────────────────────
function showError(msg) {
  document.getElementById('empty-state').style.display = 'none';
  const area = document.getElementById('result-area');
  area.style.display = 'block';
  area.innerHTML = `<div class="error-box">⚠ ${msg}</div>`;
}

// ── 결과 렌더링 ───────────────────────────────────────
function renderResults(d) {
  document.getElementById('empty-state').style.display = 'none';
  const area = document.getElementById('result-area');
  area.style.display = 'block';

  // 차트 인스턴스 제거
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  const TH = d.periods;
  const labels = Array.from({length: TH}, (_, i) => `${i+1}월`);
  const T = Array.from({length: TH}, (_, i) => i + 1);

  // 데이터 슬라이싱 (t=1~TH)
  const W = T.map(t => d.W[t]);
  const H = T.map(t => d.H[t]);
  const L = T.map(t => d.L[t]);
  const P = T.map(t => d.P[t]);
  const I = T.map(t => d.I[t]);
  const S = T.map(t => d.S[t]);
  const C = T.map(t => d.C[t]);
  const O = T.map(t => d.O[t]);
  const demand = d.demand;

  const totalHire = H.reduce((a,b)=>a+b,0);
  const totalFire = L.reduce((a,b)=>a+b,0);
  const totalShortage = S.reduce((a,b)=>a+b,0);
  const totalOutsource = C.reduce((a,b)=>a+b,0);

  area.innerHTML = `
    <!-- KPI -->
    <div class="kpi-row">
      <div class="kpi-card blue">
        <div class="kpi-label">총 최소비용</div>
        <div class="kpi-value">${(d.total_cost/1000).toFixed(0)}</div>
        <div class="kpi-sub">백만원 · ${d.model_type} 모델</div>
      </div>
      <div class="kpi-card orange">
        <div class="kpi-label">고용 / 해고</div>
        <div class="kpi-value">${Math.round(totalHire)} / ${Math.round(totalFire)}</div>
        <div class="kpi-sub">명 (6개월 합계)</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">최종 재고</div>
        <div class="kpi-value">${Math.round(I[TH-1])}</div>
        <div class="kpi-sub">개 (6개월 말)</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">누적 부족재고</div>
        <div class="kpi-value">${Math.round(totalShortage)}</div>
        <div class="kpi-sub">개 · 외주 ${Math.round(totalOutsource)}개</div>
      </div>
    </div>

    <!-- 차트 행 1 -->
    <div class="charts-grid">
      <div class="chart-card wide">
        <div class="chart-title">수요 vs 생산량</div>
        <div class="chart-container" style="height:200px;">
          <canvas id="chart-prod"></canvas>
        </div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">작업자 / 고용 / 해고</div>
        <div class="chart-container" style="height:180px;">
          <canvas id="chart-worker"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">재고 / 부족재고 추이</div>
        <div class="chart-container" style="height:180px;">
          <canvas id="chart-inventory"></canvas>
        </div>
      </div>
    </div>

    <!-- 비용 분해 + 파이 -->
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">비용 구성 분석</div>
        <div id="cost-bars" class="cost-bar-wrap"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">비용 비율</div>
        <div class="chart-container" style="height:200px;">
          <canvas id="chart-cost-pie"></canvas>
        </div>
      </div>
    </div>

    <!-- 결과 테이블 -->
    <div class="table-card">
      <div class="chart-title">월별 결정변수 상세</div>
      <table>
        <thead>
          <tr>
            <th>항목</th>
            ${labels.map(l=>`<th>${l}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          <tr><td>수요 D</td>${demand.map(v=>`<td>${fmt(v)}</td>`).join('')}</tr>
          <tr><td>생산량 P</td>${P.map(v=>`<td class="td-highlight">${fmt(v)}</td>`).join('')}</tr>
          <tr><td>작업자 W</td>${W.map(v=>`<td>${fmt(v)}</td>`).join('')}</tr>
          <tr><td>고용 H</td>${H.map(v=>`<td class="${v>0?'td-warn':''}">${fmt(v)}</td>`).join('')}</tr>
          <tr><td>해고 L</td>${L.map(v=>`<td class="${v>0?'td-danger':''}">${fmt(v)}</td>`).join('')}</tr>
          <tr><td>재고 I</td>${I.map(v=>`<td>${fmt(v)}</td>`).join('')}</tr>
          <tr><td>부족재고 S</td>${S.map(v=>`<td class="${v>0?'td-danger':''}">${fmt(v)}</td>`).join('')}</tr>
          <tr><td>외주 C</td>${C.map(v=>`<td class="${v>0?'td-warn':''}">${fmt(v)}</td>`).join('')}</tr>
          <tr><td>초과시간 O</td>${O.map(v=>`<td>${fmt(v)}</td>`).join('')}</tr>
        </tbody>
      </table>
    </div>
  `;

  // 차트 공통 옵션
  const fontColor = '#64748b';
  const gridColor = 'rgba(30,45,69,0.8)';
  const baseOpts = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { labels: { color: fontColor, font: { family: 'IBM Plex Mono', size: 11 } } } },
    scales: {
      x: { grid: { color: gridColor }, ticks: { color: fontColor, font: { family: 'IBM Plex Mono', size: 10 } } },
      y: { grid: { color: gridColor }, ticks: { color: fontColor, font: { family: 'IBM Plex Mono', size: 10 } } }
    }
  };

  // 1) 수요 vs 생산
  charts.prod = new Chart(document.getElementById('chart-prod'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '수요', data: demand, backgroundColor: 'rgba(255,107,53,0.5)', borderColor: '#ff6b35', borderWidth: 1.5 },
        { label: '생산', data: P, backgroundColor: 'rgba(0,212,255,0.4)', borderColor: '#00d4ff', borderWidth: 1.5 },
        { label: '외주', data: C, backgroundColor: 'rgba(0,255,157,0.4)', borderColor: '#00ff9d', borderWidth: 1.5 },
      ]
    },
    options: { ...baseOpts, scales: { ...baseOpts.scales, y: { ...baseOpts.scales.y, stacked: false } } }
  });

  // 2) 작업자
  charts.worker = new Chart(document.getElementById('chart-worker'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '작업자', data: W, type: 'line', borderColor: '#00d4ff', backgroundColor: 'rgba(0,212,255,0.1)', tension: 0.3, yAxisID: 'y' },
        { label: '고용', data: H, backgroundColor: 'rgba(0,255,157,0.6)', yAxisID: 'y2' },
        { label: '해고', data: L, backgroundColor: 'rgba(255,71,87,0.6)', yAxisID: 'y2' },
      ]
    },
    options: {
      ...baseOpts,
      scales: {
        x: baseOpts.scales.x,
        y: { ...baseOpts.scales.y, position: 'left' },
        y2: { ...baseOpts.scales.y, position: 'right', grid: { drawOnChartArea: false } }
      }
    }
  });

  // 3) 재고 추이
  charts.inv = new Chart(document.getElementById('chart-inventory'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '재고',
          data: I,
          borderColor: '#00d4ff',
          backgroundColor: 'rgba(0,212,255,0.1)',
          fill: true, tension: 0.3
        },
        {
          label: '부족재고',
          data: S,
          borderColor: '#ff4757',
          backgroundColor: 'rgba(255,71,87,0.15)',
          fill: true, tension: 0.3
        }
      ]
    },
    options: baseOpts
  });

  // 4) 비용 바 차트
  const cb = d.cost_breakdown;
  const maxCost = Math.max(...Object.values(cb));
  const colors = ['#00d4ff','#ff6b35','#00ff9d','#ff4757','#ffd32a','#a855f7','#64748b','#22d3ee'];
  const barsHtml = Object.entries(cb).map(([k,v], i) => `
    <div class="cost-bar-item">
      <div class="cost-bar-label">${k}</div>
      <div class="cost-bar-track">
        <div class="cost-bar-fill" style="width:${(v/maxCost*100).toFixed(1)}%; background:${colors[i]};"></div>
      </div>
      <div class="cost-bar-val">${(v/1000).toFixed(0)}M</div>
    </div>
  `).join('');
  document.getElementById('cost-bars').innerHTML = barsHtml;

  // 5) 비용 파이
  charts.pie = new Chart(document.getElementById('chart-cost-pie'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(cb),
      datasets: [{
        data: Object.values(cb),
        backgroundColor: colors,
        borderColor: '#111827',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'right',
          labels: { color: fontColor, font: { family: 'IBM Plex Mono', size: 10 }, boxWidth: 12, padding: 8 }
        }
      }
    }
  });
}

function fmt(v) {
  if (v === null || v === undefined) return '-';
  const n = parseFloat(v);
  return Number.isInteger(n) ? n.toLocaleString() : n.toFixed(1);
}

init();
</script>
</body>
</html>
